; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = teensy41

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
lib_deps = 
	SPI
	bblanchon/ArduinoJson@^6.21.5
	https://github.com/Steward-Observatory-ETS/NativeEthernet.git
	https://github.com/Steward-Observatory-ETS/NTPClient_Generic.git
	https://github.com/Steward-Observatory-ETS/pubsubclient.git
	https://github.com/Steward-Observatory-ETS/so_sparkplugb.git
build_flags = 
	-I .pio/libdeps/teensy41/so_sparkplugb/tahu

[env:teensy41_debug]
platform = teensy
board = teensy41
framework = arduino
lib_deps = ${env:teensy41.lib_deps}
build_type = debug
build_flags = 
	-D DEBUG
	-I .pio/libdeps/teensy41_debug/so_sparkplugb/tahu
